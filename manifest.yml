modules:
  jira:customFieldType:
    - key: triple-cascada-avanzada
      name: Triple Cascada Avanzada
      description: "Campo multinivel con tres niveles de selección."
      type: object
      readOnly: false
      formatter:
        expression: "[value.level1 || value.l1_label, value.level2 || value.l2_label,
          value.level3 || value.l3_label].filter(i => i != null && i !==
          'null').join(' > ')"
      edit:
        resource: edit-resource
        experience:
          - issue-create
          - issue-transition
          - issue-view
          - portal-request
      contextConfig:
        resource: config-resource
      resolver:
        function: resolver-function
  function:
    - key: resolver-function
      handler: index.resolvers
resources:
  - key: edit-resource
    path: static/edit/build
  - key: config-resource
    path: static/configurable-validation/build
permissions:
  content:
    styles:
      - unsafe-inline
  scopes:
    - storage:app
app:
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/33c54b3f-96ca-45f3-a451-1db699b78e64
