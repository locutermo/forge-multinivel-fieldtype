modules:
  jira:customFieldType:
    - key: triple-cascada-avanzada
      name: Triple Cascada Avanzada
      description: "Campo multinivel con tres niveles de selección."
      type: string

      edit:
        resource: edit-resource
        experience:
          - issue-create
          - issue-transition
          - issue-view
          - portal-request
      unlicensedAccess:
          - unlicensed       
          - customer
      view:
        formatter:
          expression: value
        render: native
        experience:
          - issue-view
          - portal-view
          
      contextConfig:
        resource: config-resource
      resolver:
        function: resolver-function
  jira:workflowValidator:
    - key: cascading-validator
      name: Validador de Campo Cascada
      description: Valida que el campo Segmento/pais tenga seleccionados tanto el nivel padre como el hijo.
      function: validate-cascading
  function:
    - key: resolver-function
      handler: index.resolvers
    - key: validate-cascading
      handler: validator.validate
resources:
  - key: edit-resource
    path: static/edit/build
    tunnel:
      port: 3000
  - key: config-resource
    path: static/configurable-validation/build
    tunnel:
      port: 3001
    
permissions:
  content:
    styles:
      - unsafe-inline
  scopes:
    - storage:app
    - read:jira-work
    - write:jira-work
    - read:jira-user
    - read:servicedesk-request
    - write:servicedesk-request
app:
  runtime:
    name: nodejs22.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/33c54b3f-96ca-45f3-a451-1db699b78e64
